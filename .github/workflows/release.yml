name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: taskforce
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: taskforce
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: taskforce.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive_base="taskforce-${{ github.ref_name }}-${{ matrix.target }}"
          staging_dir="$archive_base"
          mkdir -p "$staging_dir"
          install -m 755 "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$staging_dir/${{ matrix.binary_name }}"
          install -m 644 README.md "$staging_dir/README.md"
          install -m 644 LICENSE-MIT "$staging_dir/LICENSE-MIT"
          install -m 644 LICENSE-APACHE "$staging_dir/LICENSE-APACHE"
          install -m 644 NOTICE "$staging_dir/NOTICE"
          tar -czf "$archive_base.tar.gz" "$staging_dir"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveBase = "taskforce-${{ github.ref_name }}-${{ matrix.target }}"
          $stagingDir = $archiveBase
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$stagingDir/${{ matrix.binary_name }}"
          Copy-Item "README.md" "$stagingDir/README.md"
          Copy-Item "LICENSE-MIT" "$stagingDir/LICENSE-MIT"
          Copy-Item "LICENSE-APACHE" "$stagingDir/LICENSE-APACHE"
          Copy-Item "NOTICE" "$stagingDir/NOTICE"
          Compress-Archive -Path $stagingDir -DestinationPath "$archiveBase.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: taskforce-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
